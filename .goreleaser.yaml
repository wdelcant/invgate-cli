version: 2

builds:
  - main: ./cmd/invgate-cli
    binary: invgate-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/wdelcant/invgate-cli/internal/version.Version={{.Version}}
      - -X github.com/wdelcant/invgate-cli/internal/version.Commit={{.Commit}}
      - -X github.com/wdelcant/invgate-cli/internal/version.Date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else if eq .Os "linux" }}Linux
      {{- else if eq .Os "windows" }}Windows
      {{- end }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

brews:
  - repository:
      owner: wdelcant
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/wdelcant/invgate-cli
    description: "Runtime OpenAPI/Swagger CLI — works with any Swagger/OpenAPI spec"
    license: MIT
    install: |
      bin.install "invgate-cli"
    test: |
      system "#{bin}/invgate-cli", "--version"

release:
  github:
    owner: wdelcant
    name: invgate-cli

checksum:
  name_template: 'checksums.txt'

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
