name: auto-version

on:
  push:
    branches: [main]
    paths-ignore:
      - '.version'
      - 'README.md'
      - '.github/**'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    outputs:
      version: ${{ steps.semver.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type
        id: bump_type
        run: |
          MSG="${{ github.event.head_commit.message }}"
          BODY="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qE '^fix[(!:)]|^fix$' || echo "$BODY" | grep -q 'BREAKING CHANGE'; then
            # Check for breaking change marker in message body
            if echo "$BODY" | grep -q 'BREAKING CHANGE'; then
              echo "type=major" >> $GITHUB_OUTPUT
            else
              echo "type=patch" >> $GITHUB_OUTPUT
            fi
          elif echo "$MSG" | grep -qE '^feat![:]' || echo "$MSG" | grep -q '!:' ; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qE '^feat[(:]' ; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Read current version
        id: current
        run: echo "version=$(cat .version)" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: semver
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          case "${{ steps.bump_type.outputs.type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          echo "new_version=$new" >> $GITHUB_OUTPUT
          echo "$new" > .version

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .version
          git commit -m "chore(release): bump to v${{ steps.semver.outputs.new_version }} [skip ci]"
          git tag "v${{ steps.semver.outputs.new_version }}"
          git push
          git push --tags

      - name: Trigger release
        run: |
          gh workflow run release.yml --ref "v${{ steps.semver.outputs.new_version }}" --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
